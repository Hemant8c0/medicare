services:
  - type: web
    name: medicare-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_DEMO_DATA
        value: "true"
      - key: PYTHON_VERSION
        value: 3.10.11
